# Place this in /etc/nginx/sites-available/private_chat
# Served under a secret path — looks like a random tool on shivmarg.live

server {
    listen 443 ssl;
    server_name shivmarg.live;

    # Point to your existing SSL certs
    ssl_certificate     /etc/letsencrypt/live/shivmarg.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shivmarg.live/privkey.pem;

    # ── Secret path — only you two know this ────────────────────
    location /u/x7k2p/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";   # required for WebSocket
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 3600;   # keep WS connections alive
    }

    # ── WebSocket endpoint ───────────────────────────────────────
    location /u/x7k2p/ws/ {
        proxy_pass         http://127.0.0.1:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600;
    }
}
