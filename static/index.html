<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes — shivmarg.live</title>  <!-- innocent title -->
<style>
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #222;
    --border: #2a2a2a; --text: #e8e8e8; --muted: #888;
    --accent: #6c63ff; --accent2: #8b82ff;
    --danger: #e05555; --success: #4caf7d;
    --msg-me: #1e1a3a; --msg-them: #1a1a1a;
    --radius: 12px; --font: system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); height: 100dvh; display: flex; overflow: hidden; }

  /* ── auth screen ── */
  #auth-screen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  .auth-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 32px; width: 340px;
  }
  .auth-box h2 { font-size: 20px; margin-bottom: 4px; }
  .auth-box p  { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .field input {
    width: 100%; padding: 10px 14px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 14px; outline: none;
  }
  .field input:focus { border-color: var(--accent); }
  .btn {
    width: 100%; padding: 11px; border: none; border-radius: 8px;
    background: var(--accent); color: #fff; font-size: 14px;
    font-weight: 500; cursor: pointer; transition: opacity .15s;
  }
  .btn:hover { opacity: .88; }
  .auth-switch { text-align: center; margin-top: 14px; font-size: 13px; color: var(--muted); }
  .auth-switch a { color: var(--accent2); cursor: pointer; text-decoration: none; }
  #auth-error { color: var(--danger); font-size: 13px; margin-top: 10px; min-height: 18px; }

  /* ── sidebar ── */
  #sidebar {
    width: 260px; min-width: 260px; background: var(--surface);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
  }
  .sidebar-header {
    padding: 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar-header .me { font-size: 13px; color: var(--muted); }
  .sidebar-header .me strong { color: var(--text); display: block; font-size: 15px; }
  .icon-btn {
    background: none; border: none; color: var(--muted); cursor: pointer;
    padding: 6px; border-radius: 6px; font-size: 18px; transition: color .15s;
  }
  .icon-btn:hover { color: var(--text); }
  .channels-list { flex: 1; overflow-y: auto; padding: 8px 0; }
  .channel-item {
    padding: 10px 16px; cursor: pointer; border-radius: 8px; margin: 1px 8px;
    display: flex; align-items: center; gap: 10px; transition: background .12s;
  }
  .channel-item:hover, .channel-item.active { background: var(--surface2); }
  .channel-item .ch-icon { font-size: 18px; color: var(--muted); }
  .channel-item .ch-name { font-size: 14px; font-weight: 500; }
  .channel-item .ch-code { font-size: 11px; color: var(--muted); }
  .sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); }
  #new-ch-form {
    display: none; padding: 10px 16px;
    border-bottom: 1px solid var(--border); gap: 8px; flex-direction: column;
  }
  #new-ch-form.open { display: flex; }
  #new-ch-form input {
    padding: 8px 12px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 13px; outline: none;
  }
  #new-ch-form input:focus { border-color: var(--accent); }
  .row { display: flex; gap: 8px; }

  /* ── chat area ── */
  #chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #chat-header {
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  #chat-header .ch-info h3 { font-size: 16px; }
  #chat-header .ch-info p  { font-size: 12px; color: var(--muted); margin-top: 2px; }
  #chat-header .actions    { display: flex; gap: 8px; }
  #messages {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .bubble-wrap { display: flex; flex-direction: column; max-width: 72%; }
  .bubble-wrap.me { align-self: flex-end; align-items: flex-end; }
  .bubble-wrap.them { align-self: flex-start; align-items: flex-start; }
  .bubble {
    padding: 10px 14px; border-radius: 16px;
    font-size: 14px; line-height: 1.5; word-break: break-word; position: relative;
  }
  .bubble-wrap.me .bubble { background: var(--msg-me); border-bottom-right-radius: 4px; }
  .bubble-wrap.them .bubble { background: var(--msg-them); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .bubble .sender  { font-size: 11px; color: var(--accent2); font-weight: 600; margin-bottom: 4px; }
  .bubble .ts      { font-size: 10px; color: var(--muted); margin-top: 4px; text-align: right; }
  .bubble .star-btn { background: none; border: none; cursor: pointer; padding: 0; font-size: 14px; opacity: .4; transition: opacity .15s; }
  .bubble .star-btn:hover, .bubble .star-btn.on { opacity: 1; }
  .bubble.starred { border-left: 2px solid gold; }
  .sender-label { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
  .system-msg { text-align: center; font-size: 12px; color: var(--muted); padding: 4px; }
  .typing-indicator { font-size: 12px; color: var(--muted); padding: 4px 20px; min-height: 20px; }

  #input-bar {
    padding: 14px 20px; border-top: 1px solid var(--border);
    display: flex; align-items: flex-end; gap: 10px;
  }
  #msg-input {
    flex: 1; padding: 10px 14px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 22px;
    color: var(--text); font-size: 14px; resize: none;
    outline: none; max-height: 120px; line-height: 1.5;
  }
  #msg-input:focus { border-color: var(--accent); }
  #send-btn {
    width: 40px; height: 40px; border-radius: 50%; border: none;
    background: var(--accent); color: #fff; font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: opacity .15s; flex-shrink: 0;
  }
  #send-btn:hover { opacity: .85; }

  /* ── empty state ── */
  #empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; color: var(--muted); gap: 10px;
  }
  #empty-state svg { opacity: .3; }

  /* ── invite overlay ── */
  #invite-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7);
    align-items: center; justify-content: center; z-index: 50;
  }
  #invite-overlay.open { display: flex; }
  .invite-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px; width: 340px;
  }
  .invite-box h3 { margin-bottom: 12px; }
  .invite-code {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 16px;
    font-family: monospace; font-size: 20px; letter-spacing: 3px;
    text-align: center; margin: 12px 0; color: var(--accent2);
  }
  .invite-box p { font-size: 13px; color: var(--muted); }

  #panic-hint { font-size: 11px; color: var(--muted); text-align: center; padding: 6px; }
</style>
</head>
<body>

<!-- ── Auth Screen ── -->
<div id="auth-screen">
  <div class="auth-box">
    <h2 id="auth-title">Sign in</h2>
    <p id="auth-sub">Enter your credentials to continue</p>
    <div class="field">
      <label>Username</label>
      <input id="auth-username" type="text" autocomplete="off" spellcheck="false">
    </div>
    <div class="field">
      <label>Password</label>
      <input id="auth-password" type="password">
    </div>
    <button class="btn" id="auth-btn">Sign in</button>
    <div id="auth-error"></div>
    <div class="auth-switch">
      <span id="auth-switch-text">No account? </span>
      <a id="auth-switch-link">Create one</a>
    </div>
  </div>
</div>

<!-- ── Main App ── -->
<div id="sidebar">
  <div class="sidebar-header">
    <div class="me">
      <strong id="my-name">—</strong>
      Private chat
    </div>
    <button class="icon-btn" title="New channel / Join" onclick="openNewCh()">+</button>
  </div>

  <div id="new-ch-form">
    <input id="ch-name-input" placeholder="Channel name">
    <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);cursor:pointer">
      <input type="checkbox" id="ch-group"> Group room
    </label>
    <div class="row">
      <button class="btn" style="background:var(--accent)" onclick="createChannel()">Create</button>
      <button class="btn" style="background:var(--surface2);color:var(--text)" onclick="closeNewCh()">Cancel</button>
    </div>
    <hr style="border-color:var(--border);margin:4px 0">
    <input id="join-code-input" placeholder="Join via invite code">
    <button class="btn" onclick="joinChannel()" style="background:var(--success)">Join</button>
  </div>

  <div class="channels-list" id="channels-list"></div>

  <div class="sidebar-footer">
    <div id="panic-hint">Press <kbd>Esc</kbd> to close everything</div>
  </div>
</div>

<div id="chat-area">
  <div id="empty-state">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    <p>Select a channel to start chatting</p>
  </div>

  <div id="chat-main" style="display:none;flex:1;flex-direction:column;min-height:0">
    <div id="chat-header">
      <div class="ch-info">
        <h3 id="ch-title">—</h3>
        <p id="ch-subtitle">—</p>
      </div>
      <div class="actions">
        <button class="icon-btn" title="Invite code" onclick="showInvite()">🔗</button>
        <button class="icon-btn" title="Starred messages" onclick="loadStarred()">⭐</button>
      </div>
    </div>
    <div id="messages"></div>
    <div class="typing-indicator" id="typing-indicator"></div>
    <div id="input-bar">
      <textarea id="msg-input" rows="1" placeholder="Message…"></textarea>
      <button id="send-btn">↑</button>
    </div>
  </div>
</div>

<!-- ── Invite Overlay ── -->
<div id="invite-overlay">
  <div class="invite-box">
    <h3>Invite someone</h3>
    <div class="invite-code" id="invite-code-display">—</div>
    <p>Share this code. They can join via the + button → "Join via invite code".</p>
    <br>
    <button class="btn" onclick="document.getElementById('invite-overlay').classList.remove('open')">Close</button>
  </div>
</div>

<script src="/js/crypto.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
